name: Release macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build macOS app
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build DMG
        run: ./package-dmg.sh "${GITHUB_REF_NAME:-manual}"
        working-directory: macos/Latexcop

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: Latexcop-macOS
          path: macos/Latexcop/.build/dist/Latexcop-*.dmg

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: macos/Latexcop/.build/dist/Latexcop-*.dmg
          generate_release_notes: true
